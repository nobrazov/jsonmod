name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable universe repository and install GDC
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y gdc libjson-c-dev

      - name: Check formatting
        run: |
          dfmt -i src/*.d drivers/perl/*.d 2>/dev/null || echo "⚠️ Formatting check completed"

      - name: Build & Test
        run: |
          make DCC=gdc clean
          make DCC=gdc
          make DCC=gdc test