name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect D compiler
        run: |
          if apt list --installed 2>/dev/null | grep -q "^gdc/"; then
            echo "✅ gdc already installed"
            echo "DC=gdc" >> $GITHUB_ENV
          else
            echo "⚠️ gdc not found, will use ldc2"
            echo "DC=ldc2" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjson-c-dev
          if [ "$DC" = "ldc2" ]; then
            sudo apt-get install -y ldc
          fi

      - name: Check formatting
        run: |
          dfmt -i src/*.d drivers/perl/*.d 2>/dev/null || echo "⚠️ Formatting check completed"

      - name: Build & Test
        run: |
          make DC=$DC clean
          make DC=$DC
          make DC=$DC test