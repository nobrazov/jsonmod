name: Build Binaries

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            triple: x86_64-linux-gnu
            qemu_cmd: ""
            pkg_path: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            triple: aarch64-linux-gnu
            qemu_cmd: ""
            pkg_path: ""
          - arch: armhf
            runner: ubuntu-latest
            triple: arm-linux-gnueabihf
            qemu_cmd: "qemu-arm-static"
            pkg_path: "/usr/lib/arm-linux-gnueabihf/pkgconfig"
          - arch: riscv64
            runner: ubuntu-latest
            triple: riscv64-linux-gnu
            qemu_cmd: "qemu-riscv64-static"
            pkg_path: "/usr/lib/riscv64-linux-gnu/pkgconfig"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ldc libjson-c-dev qemu-user-static binfmt-support pkg-config

      - name: Configure cross-compilation
        run: |
          echo "DC=ldc2" >> $GITHUB_ENV
          echo "LDCFLAGS=-mtriple=${{ matrix.triple }}" >> $GITHUB_ENV
          if [ -n "${{ matrix.pkg_path }}" ]; then
            echo "PKG_CONFIG_PATH=${{ matrix.pkg_path }}" >> $GITHUB_ENV
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          fi

      - name: Build binaries
        run: |
          make clean
          make DFLAGS="${{ env.LDCFLAGS }}"
          make libjsonmod.so DFLAGS="${{ env.LDCFLAGS }}"

      - name: Validate binary
        run: |
          if [ -n "${{ matrix.qemu_cmd }}" ]; then
            echo '{"test":"ok"}' | ${{ matrix.qemu_cmd }} ./jsonmod > /dev/null
          else
            echo '{"test":"ok"}' | ./jsonmod > /dev/null
          fi
          echo "✅ ${{ matrix.arch }} binary validated"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: jsonmod-${{ matrix.arch }}
          path: |
            jsonmod
            libjsonmod.so
          retention-days: 5