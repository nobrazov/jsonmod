name: Build Binaries
on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-latest
          - arch: riscv64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y gdc libjson-c-dev pkg-config libpq-dev

      - name: Build binaries
        run: |
          make clean
          make -j$(nproc)
          make -j$(nproc) libjsonmod.so

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: jsonmod-${{ matrix.arch }}
          path: |
            jsonmod
            libjsonmod.so
          retention-days: 5

      - name: Attach binaries to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jsonmod
            libjsonmod.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}